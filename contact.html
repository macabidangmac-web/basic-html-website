<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mark | Contact</title>
    <meta
      name="description"
      content="Contact Mark through this HTML-only contact page."
    />
    <meta
      name="keywords"
      content="HTML, contact, frontend, portfolio"
    />

  </head>
  <body>
    <header>
      <h1>Mark</h1>
      <nav aria-label="Main navigation">
        <a href="index.html">Home</a> /
        <a href="projects.html">Projects</a> /
        <a href="articles.html">Articles</a> /
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <main>
      <section>
        <h2>Contact Me</h2>
        <p>Feel free to send me a message using the form below.</p>

        <form action="#" method="post">
          <p>
            <label for="name">Name:</label><br />
            <input type="text" id="name" name="name" required />
          </p>

          <p>
            <label for="email">Email:</label><br />
            <input type="email" id="email" name="email" required />
          </p>

          <p>
            <label for="message">Message:</label><br />
            <textarea id="message" name="message" rows="6" cols="30" required></textarea>
          </p>

          <p>
            <button type="submit">Send Message</button>
          </p>
        </form>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mark. All rights reserved.</p>
    </footer>
  </body>
</html>
